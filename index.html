<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居中适配图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }
        .img-box {
            width: 90vw;
            max-width: 720px;
            text-align: center;
        }
        .img-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .tip {
            margin-top: 12px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="img-box">
        <img src="qr-code.png" alt="展示图片">
        <p class="tip">保存图片打开微信APP扫码添加</p>
    </div>
</body>
</html>
